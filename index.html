<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bazaraki Substation Lookup</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <h1>Bazaraki Substation Lookup</h1>
        <p class="subtitle">Find which EAC transmission substation a plot of land belongs to.</p>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('bazaraki', event)">Bazaraki URL</button>
            <button class="tab-btn" onclick="switchTab('map', event)">Pin on Map</button>
            <button class="tab-btn" onclick="switchTab('address', event)">Search Address</button>
        </div>

        <!-- Tab 1: Bazaraki URL -->
        <div id="tab-bazaraki" class="tab-panel active">
            <form onsubmit="doBazarakiLookup(event)">
                <div class="input-group">
                    <div class="input-wrapper">
                        <input type="text" id="url" placeholder="https://www.bazaraki.com/adv/..." autofocus oninput="toggleClear('url','clearBtn')">
                        <button type="button" class="clear-btn" id="clearBtn" onclick="clearField('url','clearBtn')">✕</button>
                    </div>
                    <button type="submit" class="submit" id="bazBtn">Lookup</button>
                </div>
            </form>
        </div>

        <!-- Tab 2: Pin on Map -->
        <div id="tab-map" class="tab-panel">
            <div id="map"></div>
            <div class="map-hint" id="mapHint">Click anywhere on the map to drop a pin</div>
            <button class="submit" id="mapLookupBtn" disabled onclick="doMapLookup()">Lookup</button>
        </div>

        <!-- Tab 3: Address Search -->
        <div id="tab-address" class="tab-panel">
            <form onsubmit="doAddressSearch(event)">
                <div class="input-group">
                    <div class="input-wrapper">
                        <input type="text" id="addrInput" placeholder="e.g. Paralimni, Protaras, Larnaca..." oninput="toggleClear('addrInput','addrClearBtn')">
                        <button type="button" class="clear-btn" id="addrClearBtn" onclick="clearField('addrInput','addrClearBtn'); clearAddressResults()">✕</button>
                    </div>
                    <button type="submit" class="submit" id="addrSearchBtn">Search</button>
                </div>
            </form>
            <ul class="address-results" id="addrResults"></ul>
            <div id="addrMap"></div>
            <button class="submit" id="addrLookupBtn" style="display:none" onclick="doAddrLookup()">Lookup this location</button>
        </div>

        <div id="result"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
